name: Sync Renungan RAG & Generate Batch

on:
  schedule:
    # pipeline_renungan.py -- setiap hari jam 02:00 WITA = 18:00 UTC hari
    # sebelumnya (WITA = UTC+8)
    - cron: "0 18 * * *"
    # trigger /api/cron/generate-renungan -- Minggu jam 10:00 WITA = 02:00 UTC
    # (samakan dengan jadwal di vercel.json)
    - cron: "0 2 * * 0"
  workflow_dispatch:
    # supaya bisa dites manual dari tab Actions di GitHub, tanpa harus
    # menunggu jadwal cron
    inputs:
      job:
        description: "Job yang mau dijalankan manual"
        required: true
        type: choice
        options:
          - sync-renungan
          - generate-renungan
          - both
        default: both

jobs:
  sync-renungan:
    # Jalan kalau: (a) trigger dari cron jam 18:00 UTC (harian), atau
    # (b) manual dispatch dengan job=sync-renungan / both
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 18 * * *') ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'sync-renungan' || github.event.inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/rag/requirements.txt

      - name: Jalankan pipeline_renungan.py
        working-directory: scripts/rag
        env:
          COCKROACHDB_HOST: ${{ secrets.COCKROACHDB_HOST }}
          COCKROACHDB_PORT: ${{ secrets.COCKROACHDB_PORT }}
          COCKROACHDB_DBNAME: ${{ secrets.COCKROACHDB_DBNAME }}
          COCKROACHDB_USER: ${{ secrets.COCKROACHDB_USER }}
          COCKROACHDB_PASSWORD: ${{ secrets.COCKROACHDB_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY_1: ${{ secrets.GOOGLE_API_KEY_1 }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python pipeline_renungan.py

  generate-renungan:
    # Jalan kalau: (a) trigger dari cron jam 02:00 UTC Minggu, atau
    # (b) manual dispatch dengan job=generate-renungan / both
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 2 * * 0') ||
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.job == 'generate-renungan' || github.event.inputs.job == 'both'))
    runs-on: ubuntu-latest
    steps:
      - name: Trigger route generate-renungan
        run: |
          curl -sf -X POST "${{ secrets.APP_URL }}/api/cron/generate-renungan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -o response.json \
            -w "HTTP status: %{http_code}\n"
          cat response.json
